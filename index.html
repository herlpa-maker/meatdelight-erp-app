<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7a1f1f">
  <title>MEATDELIGHT ERP</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #7a1f1f, #0f172a);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 380px;
      width: 100%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }

    p {
      opacity: 0.9;
      line-height: 1.4;
      font-size: 14px;
    }

    button, a {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 16px;
      background: white;
      color: #7a1f1f;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
      font-size: 15px;
      border: none;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .secondary {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="box">
    <h1>MEATDELIGHT ERP</h1>
    <p>Tap below to open the ERP securely.</p>

    <button onclick="openERP()">
      Open ERP (Recommended)
    </button>

    <a class="secondary"
       href="https://script.google.com/a/ayobrothers.com/macros/s/AKfycbwyUliIctf-U18sI_pZJIQTpvpnqwVnsWL2LDSQQDzpBvq85STuqsC9DwhpuK8XZhYu/exec?page=portal&email=herlpa@gmail.com"
       target="_blank"
       rel="noopener">
      Open ERP (Fallback)
    </a>

    <div class="hint">
      Optimized for mobile access.
    </div>
  </div>

  <script>
    const ERP_URL =
      "https://script.google.com/a/ayobrothers.com/macros/s/AKfycbwyUliIctf-U18sI_pZJIQTpvpnqwVnsWL2LDSQQDzpBvq85STuqsC9DwhpuK8XZhYu/exec?page=portal&email=herlpa@gmail.com";

    function openERP() {
      window.location.href = ERP_URL;
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
