<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#7a1f1f">
  <title>MEATDELIGHT ERP</title>

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #7a1f1f, #0f172a);
      color: white;
      font-family: Arial;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .box { width: 90%; max-width: 380px; }

    .logo-wrap {
      background: rgba(255,255,255,0.08);
      padding: 14px;
      border-radius: 20px;
      margin-bottom: 20px;
    }

    .logo {
      width: 140px;
      display: block;
      margin: auto;
    }

    input {
      width: 100%;
      padding: 14px;
      margin-top: 12px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
    }

    button {
      width: 100%;
      margin-top: 14px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      background: white;
      color: #7a1f1f;
      font-weight: bold;
      cursor: pointer;
    }

    .error {
      color: #ffb3b3;
      margin-top: 10px;
      font-size: 13px;
    }
  </style>
</head>

<body>

<div class="box">

  <div class="logo-wrap">
    <img src="Logo.jpeg" class="logo">
  </div>

  <h2>MEATDELIGHT ERP</h2>

  <input id="email" type="text" placeholder="Email or Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="login()">Login</button>

  <div id="error" class="error"></div>

</div>

<script>
const BASE_URL = "https://script.google.com/a/ayobrothers.com/macros/s/AKfycbwyUliIctf-U18sI_pZJIQTpvpnqwVnsWL2LDSQQDzpBvq85STuqsC9DwhpuK8XZhYu/exec";

function login() {
  const email = document.getElementById("email").value.trim();
  const password = document.getElementById("password").value.trim();
  const error = document.getElementById("error");

  error.innerText = "";

  if (!email || !password) {
    error.innerText = "Enter email and password";
    return;
  }

  const url = BASE_URL + "?action=login&email=" + encodeURIComponent(email) + "&password=" + encodeURIComponent(password);

  fetch(url)
    .then(r => r.json())
    .then(res => {

      if (!res || !res.ok) {
        error.innerText = "Invalid login";
        return;
      }

      // Save session (matches your ERP pattern)
      localStorage.setItem("erp_user", res.user.email);

      // Redirect to portal
      window.location.href = BASE_URL + "?page=portal&email=" + encodeURIComponent(res.user.email);

    })
    .catch(() => {
      error.innerText = "Connection error";
    });
}
</script>

</body>
</html>
