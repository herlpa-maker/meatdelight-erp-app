<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7a1f1f">
  <title>MEATDELIGHT ERP</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: linear-gradient(135deg, #7a1f1f, #0f172a);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 390px;
      width: 100%;
    }

.logo {
  width: 150px;
  height: auto;
  object-fit: contain;
  margin: 0 auto 18px;
  display: block;
  background: transparent;
  border-radius: 0;
  box-shadow: none;
}

    h1 {
      margin: 0 0 8px;
      font-size: 25px;
    }

    p {
      opacity: 0.9;
      line-height: 1.4;
      font-size: 14px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      margin-top: 18px;
      padding: 14px;
      border-radius: 12px;
      border: none;
      font-size: 15px;
      outline: none;
    }

    button, a {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 14px;
      background: white;
      color: #7a1f1f;
      padding: 14px;
      border-radius: 12px;
      font-weight: bold;
      text-decoration: none;
      font-size: 15px;
      border: none;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .secondary {
      background: rgba(255,255,255,0.15);
      color: white;
    }

    .hint {
      margin-top: 18px;
      font-size: 12px;
      opacity: 0.75;
    }
  </style>
</head>

<body>
  <div class="box">
    <img src="Logo.jpeg" class="logo" alt="MeatDelight Logo">
    <h1>MEATDELIGHT ERP</h1>
    <p>Enter your ERP email once. The app will remember it on this phone.</p>

    <input id="emailInput" type="email" placeholder="example@ayobrothers.com">

    <button onclick="openERP()">
      Open ERP
    </button>

    <button class="secondary" onclick="clearEmail()">
      Change User
    </button>

    <div class="hint">
      AYO Brothers / MeatDelight mobile ERP launcher
    </div>
  </div>

  <script>
    const BASE_URL =
      "https://script.google.com/a/ayobrothers.com/macros/s/AKfycbwyUliIctf-U18sI_pZJIQTpvpnqwVnsWL2LDSQQDzpBvq85STuqsC9DwhpuK8XZhYu/exec";

    const DEFAULT_EMAIL = "herlpa@gmail.com";

    const emailInput = document.getElementById("emailInput");

    window.addEventListener("load", function () {
      const saved = localStorage.getItem("meatdelight_erp_email") || DEFAULT_EMAIL;
      emailInput.value = saved;
    });

    function openERP() {
      const email = String(emailInput.value || "").trim().toLowerCase();

      if (!email) {
        alert("Please enter your ERP email.");
        return;
      }

      localStorage.setItem("meatdelight_erp_email", email);

      const url =
        BASE_URL +
        "?page=portal&email=" +
        encodeURIComponent(email);

      window.location.href = url;
    }

    function clearEmail() {
      localStorage.removeItem("meatdelight_erp_email");
      emailInput.value = "";
      emailInput.focus();
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
