<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#7a1f1f">
  <title>MEATDELIGHT ERP</title>
  <link rel="manifest" href="manifest.json">

  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background:
        radial-gradient(circle at top, rgba(255,255,255,0.10), transparent 30%),
        linear-gradient(135deg, #7a1f1f, #0f172a);
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px;
    }

    .box {
      max-width: 390px;
      width: 100%;
    }

    .logo-wrap {
      background: linear-gradient(145deg, rgba(255,255,255,0.10), rgba(255,255,255,0.03));
      padding: 14px;
      border-radius: 22px;
      display: inline-block;
      margin: 0 auto 20px;
      box-shadow: 0 14px 34px rgba(0,0,0,0.28);
      backdrop-filter: blur(8px);
    }

    .logo {
      width: 150px;
      height: auto;
      display: block;
      border-radius: 12px;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 25px;
    }

    p {
      opacity: 0.9;
      font-size: 14px;
      line-height: 1.4;
    }

    button {
      display: block;
      width: 100%;
      box-sizing: border-box;
      margin-top: 14px;
      padding: 14px;
      border: none;
      border-radius: 14px;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      font-family: Arial, sans-serif;
    }

    .btn-main {
      background: white;
      color: #7a1f1f;
      box-shadow: 0 10px 22px rgba(0,0,0,0.16);
    }

    .btn-fix {
      background: rgba(255,255,255,0.14);
      color: white;
      border: 1px solid rgba(255,255,255,0.16);
    }

    .hint {
      margin-top: 16px;
      font-size: 12px;
      opacity: 0.72;
    }
  </style>
</head>

<body>
  <div class="box">
    <div class="logo-wrap">
      <img src="Logo.jpeg" class="logo" alt="MeatDelight Logo">
    </div>

    <h1>MEATDELIGHT ERP</h1>
    <p>Open secure ERP login.</p>

    <button class="btn-main" onclick="openLogin()">Login Normally</button>

    <button class="btn-fix" onclick="forceLogin()">Fix Login / Clear Session</button>

    <div class="hint">
      Use “Fix Login” if the portal gets stuck loading session.
    </div>
  </div>

  <script>
    const BASE =
      "https://script.google.com/a/ayobrothers.com/macros/s/AKfycbwyUliIctf-U18sI_pZJIQTpvpnqwVnsWL2LDSQQDzpBvq85STuqsC9DwhpuK8XZhYu/exec";

    function openLogin() {
      window.location.href = BASE + "?page=login";
    }

    function forceLogin() {
      window.location.href = BASE + "?page=login&force=1";
    }

    if ("serviceWorker" in navigator) {
      navigator.serviceWorker.register("sw.js").catch(function () {});
    }
  </script>
</body>
</html>
